<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة حصن الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–navy-deep:   #0b1428;
–navy:        #111e3c;
–navy-mid:    #162040;
–navy-card:   #1a2850;
–navy-hover:  #1e2f5c;
–teal:        #14b8a6;
–teal-light:  #2dd4bf;
–teal-dim:    rgba(20,184,166,0.18);
–gold:        #d4a843;
–gold-light:  #f0c055;
–white:       #ffffff;
–text-bright: #f0f4ff;
–text-soft:   rgba(220,230,255,0.70);
–text-muted:  rgba(180,200,255,0.45);
–border:      rgba(255,255,255,0.07);
–border-glow: rgba(20,184,166,0.30);
}

html, body {
min-height: 100vh;
font-family: “Tajawal”, sans-serif;
color: var(–text-bright);
overflow-x: hidden;
}

body {
background: var(–navy-deep);
background-image:
radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(20,184,166,0.13) 0%, transparent 60%),
radial-gradient(ellipse 60% 40% at 15% 90%,  rgba(26,40,80,0.9)    0%, transparent 65%),
radial-gradient(ellipse 50% 35% at 90% 60%,  rgba(20,50,100,0.5)   0%, transparent 60%),
linear-gradient(160deg, #0e1930 0%, #0b1428 55%, #0d1f3c 100%);
}

body::before {
content: “”;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.deco-top {
position: fixed; top: 0; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg,
transparent 0%, var(–teal) 30%, var(–gold-light) 50%, var(–teal) 70%, transparent 100%);
z-index: 100;
animation: shimmer 4s ease-in-out infinite alternate;
}
@keyframes shimmer { from { opacity: 0.7; } to { opacity: 1; } }

.page {
position: relative; z-index: 2;
min-height: 100vh;
display: flex; flex-direction: column; align-items: center;
padding: 52px 20px 64px;
}

/* ── Logo ── */
.logo-wrap {
position: relative; margin-bottom: 24px;
animation: fadeSlide 0.7s cubic-bezier(.22,1,.36,1) both;
}
.logo-bg {
width: 168px; height: 168px;
background: rgba(255,255,255,0.97);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
box-shadow:
0 0 0 1px rgba(255,255,255,0.12),
0 0 0 6px rgba(20,184,166,0.15),
0 0 40px rgba(20,184,166,0.20),
0 8px 40px rgba(0,0,0,0.5);
animation: ringPulse 3.5s ease-in-out infinite;
overflow: hidden;
}
.logo-img { width: 148px; height: 148px; object-fit: contain; display: block; }
@keyframes ringPulse {
0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 0 6px rgba(20,184,166,0.12), 0 0 40px rgba(20,184,166,0.15), 0 8px 40px rgba(0,0,0,0.5); }
50%       { box-shadow: 0 0 0 1px rgba(255,255,255,0.20), 0 0 0 8px rgba(20,184,166,0.25), 0 0 60px rgba(20,184,166,0.25), 0 8px 40px rgba(0,0,0,0.5); }
}

/* ── Bio card ── */
.bio-block {
width: 100%; max-width: 420px; margin-bottom: 28px;
animation: fadeSlide 0.75s 0.15s cubic-bezier(.22,1,.36,1) both;
}
.bio-card {
background: linear-gradient(135deg, rgba(20,184,166,0.12) 0%, rgba(17,30,60,0.90) 100%);
border: 1px solid var(–border-glow);
border-radius: 18px;
padding: 20px 24px;
box-shadow: 0 0 0 1px rgba(20,184,166,0.10), 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
position: relative; overflow: hidden; text-align: center;
backdrop-filter: blur(8px);
}
.bio-card::before {
content: “”; position: absolute;
top: 0; right: 0; bottom: 0; width: 3px;
background: linear-gradient(180deg, var(–teal-light), var(–teal), transparent);
border-radius: 0 18px 18px 0;
}
.bio-card::after {
content: “”; position: absolute;
top: 0; left: 0; bottom: 0; width: 3px;
background: linear-gradient(180deg, transparent, var(–teal), var(–teal-light));
border-radius: 18px 0 0 18px;
}
.bio-icon { font-size: 1.3rem; margin-bottom: 8px; display: block; }
.bio-text { font-size: 1.0rem; color: var(–text-bright); font-weight: 600; line-height: 1.8; }
.bio-text em { font-style: normal; color: var(–teal-light); font-weight: 800; }

/* ── Links ── */
.links { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }

.link-btn {
display: flex; align-items: center; gap: 14px;
padding: 14px 18px; border-radius: 14px;
/* Teal gradient matching bio text colour */
background: linear-gradient(135deg,
rgba(20,184,166,0.14) 0%,
rgba(17,30,60,0.88) 60%,
rgba(14,25,50,0.92) 100%);
border: 1px solid rgba(20,184,166,0.22);
text-decoration: none; color: var(–text-bright);
box-shadow: 0 4px 20px rgba(0,0,0,0.30), inset 0 1px 0 rgba(20,184,166,0.08);
transition: all 0.28s cubic-bezier(.22,1,.36,1);
position: relative; overflow: hidden;
opacity: 0; transform: translateY(18px);
backdrop-filter: blur(6px);
}

/* Subtle teal shimmer on right edge */
.link-btn::before {
content: “”; position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(20,184,166,0.10) 0%, rgba(45,212,191,0.04) 100%);
opacity: 0; transition: opacity 0.25s;
}
.link-btn::after {
content: “”; position: absolute;
right: 0; top: 25%; bottom: 25%; width: 3px;
background: linear-gradient(180deg, var(–teal-light), var(–teal));
border-radius: 3px 0 0 3px; opacity: 0.5;
transition: opacity 0.25s, top 0.25s, bottom 0.25s;
}
.link-btn:hover {
border-color: rgba(20,184,166,0.45);
transform: translateY(-3px);
box-shadow: 0 10px 36px rgba(0,0,0,0.45), 0 0 0 1px rgba(20,184,166,0.30), 0 0 20px rgba(20,184,166,0.10);
background: linear-gradient(135deg,
rgba(20,184,166,0.22) 0%,
rgba(22,38,72,0.92) 60%,
rgba(17,30,60,0.95) 100%);
}
.link-btn:hover::before { opacity: 1; }
.link-btn:hover::after  { opacity: 1; top: 10%; bottom: 10%; }
.link-btn:active { transform: scale(0.98); }

.link-icon {
width: 44px; height: 44px; border-radius: 12px;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; font-size: 1.2rem;
border: 1px solid rgba(20,184,166,0.20);
transition: transform 0.25s;
}
.link-btn:hover .link-icon { transform: scale(1.08); }

.link-text  { flex: 1; text-align: right; }
.link-label { font-size: 0.76rem; color: rgba(45,212,191,0.60); font-weight: 500; display: block; margin-bottom: 2px; }
.link-title { font-size: 0.97rem; font-weight: 700; color: var(–text-bright); }
.link-arrow { color: var(–teal-light); opacity: 0.65; font-size: 1rem; transition: transform 0.22s, opacity 0.22s; flex-shrink: 0; }
.link-btn:hover .link-arrow { transform: translateX(-5px); opacity: 1; }

.ic-map       { background: rgba(34,197,94,0.14);  color: #4ade80; }
.ic-store     { background: rgba(20,184,166,0.16); color: var(–teal-light); }
.ic-instagram { background: rgba(236,72,153,0.14); color: #f472b6; }
.ic-tiktok    { background: rgba(255,255,255,0.08);color: #e2e8f0; }
.ic-facebook  { background: rgba(96,165,250,0.14); color: #60a5fa; }
.ic-snapchat  { background: rgba(250,204,21,0.14); color: #facc15; }
.ic-whatsapp  { background: rgba(74,222,128,0.14); color: #4ade80; }

@keyframes fadeSlide {
from { opacity: 0; transform: translateY(-16px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}
.link-btn:nth-child(1) { animation: fadeUp 0.6s 0.28s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(2) { animation: fadeUp 0.6s 0.36s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(3) { animation: fadeUp 0.6s 0.44s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(4) { animation: fadeUp 0.6s 0.52s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(5) { animation: fadeUp 0.6s 0.60s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(6) { animation: fadeUp 0.6s 0.68s cubic-bezier(.22,1,.36,1) forwards; }
.link-btn:nth-child(7) { animation: fadeUp 0.6s 0.76s cubic-bezier(.22,1,.36,1) forwards; }

/* ── Luxury Footer ── */
.footer {
margin-top: 44px;
display: flex; flex-direction: column; align-items: center; gap: 14px;
animation: fadeSlide 1s 1.1s cubic-bezier(.22,1,.36,1) both;
}
.footer-divider {
display: flex; align-items: center; gap: 12px;
width: 100%; max-width: 320px;
}
.footer-divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,67,0.45)); }
.footer-divider-line.right { background: linear-gradient(270deg, transparent, rgba(212,168,67,0.45)); }
.footer-divider-diamond {
width: 7px; height: 7px; background: var(–gold);
transform: rotate(45deg); box-shadow: 0 0 10px rgba(212,168,67,0.6); flex-shrink: 0;
}
.footer-company { font-size: 0.82rem; color: rgba(200,215,255,0.50); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 8px; text-align: center; }
.footer-badge {
display: inline-flex; align-items: center; gap: 8px;
background: linear-gradient(135deg, rgba(212,168,67,0.12) 0%, rgba(240,192,85,0.08) 100%);
border: 1px solid rgba(212,168,67,0.35);
border-radius: 30px; padding: 6px 18px;
font-size: 0.80rem; color: var(–gold-light);
font-weight: 700; letter-spacing: 0.06em;
box-shadow: 0 0 16px rgba(212,168,67,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
}
.footer-badge::before { content: “✦”; font-size: 0.65rem; color: var(–gold); }
.footer-badge::after  { content: “✦”; font-size: 0.65rem; color: var(–gold); }
</style>

</head>
